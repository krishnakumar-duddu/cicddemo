name: "Wiz CLI Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  wiz-scan:
    name: Wiz Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download Wiz CLI
        run: |
          curl -o wizcli https://downloads.wiz.io/v1/wizcli/latest/wizcli-linux-amd64
          chmod +x wizcli
          # Optional: Move to path
          sudo mv wizcli /usr/local/bin/wizcli
      - name: Authenticate to Wiz
        run: wizcli iac scan --path tfplan1.json --policy "Default IaC policy" --format json > wiz-scan-results.json
        run: wizcli iac scan --path tfplan1.json --policy "Default IaC policy" --no-publish --format json > wiz-scan-results.json
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
      - name: Upload Wiz Scan Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wiz-iac-report
          path: .

  
